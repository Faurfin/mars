{% extends "base.html" %}

{% block content %}
    <div class="mt-4 text-center">
        <h2>Пейзажи Марса</h2>
        
        {% if images %}
            <div id="marsCarousel" class="carousel slide mx-auto mt-3" data-bs-ride="carousel" style="max-width: 600px;">
              <div class="carousel-inner">
                {% for image in images %}
                    <div class="carousel-item {% if loop.first %}active{% endif %}">
                        <img src="{{ url_for('static', filename='img/galery/' + image) }}" class="d-block w-100" alt="Пейзаж Марса">
                    </div>
                {% endfor %}
              </div>
              
              <button class="carousel-control-prev" type="button" data-bs-target="#marsCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Предыдущий</span>
              </button>
              <button class="carousel-control-next" type="button" data-bs-target="#marsCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Следующий</span>
              </button>
            </div>
        {% else %}
            <div class="alert alert-warning mt-3 mx-auto" style="max-width: 600px;">
                Галерея пуста. Загрузите первую фотографию!
            </div>
        {% endif %}

        <div class="mt-4 mx-auto text-start" style="max-width: 400px; border: 1px solid #dee2e6; padding: 15px; border-radius: 5px;">
            <form method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label text-muted">Добавить картинку</label>
                    <input type="file" class="form-control" name="file" required>
                </div>
                <button type="submit" class="btn btn-primary">Отправить</button>
            </form>
        </div>
        
    </div>
    
    {% endblock %}
